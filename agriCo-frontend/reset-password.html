<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>agriCo - Réinitialiser le mot de passe</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="auth.css" rel="stylesheet"/>
  <!--<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="auth.css" rel="stylesheet"/>-->
  <script src="nav.js"></script>
</head>
<body>
  <main class="main-wrapper">
    <div class="page-brand mb-3">
      <img src="images/logo.png" alt="agriCo" class="brand-logo page-logo img-fluid" />
    </div>

    <h1 class="page-title">Réinitialiser le mot de passe</h1>
    <p class="page-subtitle">Entrez votre adresse e-mail pour recevoir un lien de réinitialisation.</p>

    <div class="auth-card w-100">
      <label class="form-label" for="email">Adresse e-mail</label>
      <div class="input-group-custom mb-3">
        <span class="input-icon"><i class="fa-solid fa-envelope"></i></span>
        <input type="email" id="email" placeholder="vous@exemple.com" autocomplete="email"/>
      </div>

      <button class="btn-connect w-100 mb-4" type="button" id="sendReset">
        Envoyer le lien
      </button>

      <p class="text-center"><a href="login.html">Retour à la connexion</a></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
